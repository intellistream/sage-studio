enabled: false
auto_start: false
model: ""
gateway_url: ""

react_loop:
  max_steps: 5
  step_delay: 0.0

agent:
  state_file: ".vida_agent_state.json"
  working_top_k: 10
  episodic_top_k: 5
  semantic_top_k: 5
  working_memory_capacity: 20
  drain_timeout_seconds: 5.0
  persist_on_each_step: true
  close_memory_on_shutdown: true

memory:
  data_dir: null
  working_memory: {}
  episodic_memory: {}
  semantic_memory: {}

reflection:
  enabled: true
  interval_seconds: 1800
  top_k_episodes: 10
  reflection_query: ""

trigger:
  enabled: false
  interval_triggers: {}
