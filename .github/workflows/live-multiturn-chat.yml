name: Live Multi-turn Chat

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Studio backend URL"
        required: false
        default: "http://127.0.0.1:8080"
      start_backend:
        description: "Auto start backend in workflow"
        required: false
        type: boolean
        default: true
      real_model:
        description: "Require real-model deltas (no mock/timeout/error)"
        required: false
        type: boolean
        default: false

jobs:
  live-multiturn:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHONPATH: ${{ github.workspace }}/src
      STUDIO_LIVE_IT: "1"
      STUDIO_BACKEND_URL: ${{ inputs.backend_url }}
      STUDIO_LIVE_REQUIRE_REAL_MODEL: ${{ inputs.real_model && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Start Studio backend
        if: ${{ inputs.start_backend }}
        run: |
          nohup python -m uvicorn sage.studio.api.app:app --host 127.0.0.1 --port 8080 > /tmp/studio_backend_live.log 2>&1 &
          echo $! > /tmp/studio_backend_live.pid

      - name: Wait for backend health
        run: |
          python - <<'PY'
          import os
          import time
          import requests

          base_url = os.environ.get("STUDIO_BACKEND_URL", "http://127.0.0.1:8080").rstrip("/")
          health_url = f"{base_url}/health"
          for _ in range(60):
              try:
                  r = requests.get(health_url, timeout=2)
                  if r.status_code == 200:
                      print(f"Backend healthy: {health_url}")
                      break
              except Exception:
                  pass
              time.sleep(1)
          else:
              raise SystemExit(f"Backend not healthy: {health_url}")
          PY

      - name: Run live multi-turn integration test
        run: |
          pytest tests/integration/test_live_multiturn_chat.py -q

      - name: Upload backend log
        if: always() && inputs.start_backend
        uses: actions/upload-artifact@v4
        with:
          name: studio-backend-live-log
          path: /tmp/studio_backend_live.log
          retention-days: 7

      - name: Stop backend
        if: always() && inputs.start_backend
        run: |
          if [ -f /tmp/studio_backend_live.pid ]; then
            kill "$(cat /tmp/studio_backend_live.pid)" 2>/dev/null || true
          fi
