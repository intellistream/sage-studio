# SAGE Studio CI - 集成测试
#
# 在每次 push 和 PR 时运行单元测试和集成测试
#
# 测试覆盖:
#   - 单元测试: Pipeline Builder, Node Registry, API Routes
#   - 集成测试: CLI, Chat Routes, LLM 集成, E2E workflows

name: CI Tests

on:
  push:
    branches:
      - main
      - main-dev
      - 'feature/**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci-test.yml'

  pull_request:
    branches:
      - main
      - main-dev
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci-test.yml'

  workflow_dispatch:
    inputs:
      test_type:
        description: '测试类型'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        # python-version: ['3.10', '3.11']  # deprecated: 3.10 support removed
        python-version: ['3.11']

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONPATH: ${{ github.workspace }}/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        if: ${{ github.event.inputs.test_type == 'unit' || github.event.inputs.test_type == 'all' || github.event.inputs.test_type == '' }}
        run: |
          pytest tests/unit/ -v -m "not slow" \
            --tb=short \
            --color=yes

      - name: Run integration tests
        if: ${{ github.event.inputs.test_type == 'integration' || github.event.inputs.test_type == 'all' || github.event.inputs.test_type == '' }}
        run: |
          pytest tests/integration/ -v -m "integration" \
            --tb=short \
            --color=yes \
            -k "not (test_llm_autostart or test_e2e_integration)"
        # 跳过需要 LLM 引擎的测试（将在后续 E2E job 中运行）

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
            htmlcov/
          retention-days: 7

  # E2E 测试 - 需要运行实际的 LLM 引擎
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: test

    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      PYTHONPATH: ${{ github.workspace }}/src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run LLM 集成测试 (CPU backend)
        run: |
          # 运行 LLM 自动启动集成测试
          pytest tests/integration/test_studio_llm_integration.py -v \
            --tb=short \
            --color=yes \
            -s
        env:
          # 使用较小的模型进行 CI 测试
          SAGE_STUDIO_TEST_MODEL: "Qwen/Qwen2.5-1.5B-Instruct"
          SAGE_STUDIO_TEST_BACKEND: "cpu"

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            .pytest_cache/
            *.log
          retention-days: 7

  # 代码质量检查
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff==0.15.4

      - name: Run Ruff
        run: |
          echo "🔍 Running Ruff linter..."
          ruff check src/ tests/ --output-format=github

      - name: Run Ruff format check
        run: |
          echo "🎨 Checking code formatting..."
          ruff format --check src/ tests/
